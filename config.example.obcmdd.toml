# obcmdd — relay server config
# Path: /etc/obcmd/obcmdd.toml

# Domain you control. Required unless insecure=true.
domain = "relay.example.com"

# HTTPS listener. Let's Encrypt provisioning uses TLS-ALPN-01 on this
# same port, so :443 is the only port obcmdd needs reachable inbound
# (port 80 is not required).
listen_addr = ":443"

# Cache directory for the Let's Encrypt cert.
acme_cache_dir = "/var/lib/obcmd/autocert"
# Optional contact email passed to Let's Encrypt.
acme_email = "you@example.com"

# Pre-shared HMAC keys (base64, 32 bytes each). Generate with:
#   obcmdd keygen --count 2
agent_key    = ""
operator_key = ""

# Agent IDs the relay accepts.
agent_ids = ["win-host"]

# Set to true to skip TLS and listen on insecure_addr — useful for
# local testing only. Never enable in production.
# insecure      = false
# insecure_addr = ":8080"
