# GoReleaser config for rcmd.
#
# Builds three binaries (rcmdd, rcmd, rcmd-agent) for the
# platforms each one actually runs on, ships archives + deb/rpm to
# GitHub Releases, and publishes Homebrew + Scoop manifests to your
# personal taps at github.com/obay.
#
# Tagging: tag a release with `git tag v0.1.0 && git push --tags`, then
# `goreleaser release --clean`.

version: 2

project_name: rcmd

before:
  hooks:
    - go mod tidy

builds:
  # rcmdd — the relay. Linux only.
  - id: rcmdd
    main: ./cmd/rcmdd
    binary: rcmdd
    env:
      - CGO_ENABLED=0
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  # rcmd — the operator CLI. Runs anywhere a human types.
  - id: rcmd
    main: ./cmd/rcmd
    binary: rcmd
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  # rcmd-agent — the remote-exec agent. Ships ONLY for Windows amd64.
  # The source still cross-compiles to darwin/linux via build tags for
  # local development, but we don't release those artifacts.
  - id: rcmd-agent
    main: ./cmd/rcmd-agent
    binary: rcmd-agent
    env:
      - CGO_ENABLED=0
    goos: [windows]
    goarch: [amd64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: rcmd-cli
    ids: [rcmd]
    name_template: "rcmd_{{.Version}}_{{.Os}}_{{.Arch}}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*

  - id: rcmd-agent
    ids: [rcmd-agent]
    name_template: "rcmd-agent_{{.Version}}_{{.Os}}_{{.Arch}}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*

  - id: rcmdd
    ids: [rcmdd]
    name_template: "rcmdd_{{.Version}}_{{.Os}}_{{.Arch}}"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE*
      - deploy/rcmdd.service

nfpms:
  - id: rcmdd-deb
    package_name: rcmdd
    builds: [rcmdd]
    vendor: obay
    homepage: https://github.com/obay/rcmd
    maintainer: obay <ahmad.obay@gmail.com>
    description: rcmd relay server
    license: MIT
    formats: [deb, rpm]
    bindir: /usr/local/bin
    contents:
      - src: deploy/rcmdd.service
        dst: /lib/systemd/system/rcmdd.service
    scripts:
      preinstall:  deploy/preinst.sh
      postinstall: deploy/postinst.sh
      preremove:   deploy/prerm.sh
      postremove:  deploy/postrm.sh

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

# Homebrew tap at github.com/obay/homebrew-tap.
# directory: Formula is required because the tap has a Formula/ subdir;
# when present, brew only looks there and ignores repo-root .rb files.
#
# Only the operator CLI ships via brew. The relay (rcmdd) is a system
# daemon that needs a dedicated service user, privileged port :443, and
# /etc/ and /var/lib/ paths — none of which brew can provide cleanly.
# Use the .deb / .rpm for rcmdd; see the README.
brews:
  - name: rcmd
    ids: [rcmd-cli]
    directory: Formula
    repository:
      owner: obay
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/obay/rcmd
    description: Operator CLI for the rcmd remote-exec relay
    license: MIT
    install: |
      bin.install "rcmd"
    test: |
      system "#{bin}/rcmd", "version"

# rcmdd ships only via .deb / .rpm / tarball — see nfpms above.
# rcmd-agent is Windows-only — see scoops below.

# Scoop bucket at github.com/obay/scoop-bucket. Windows users install
# the agent with: scoop bucket add obay https://github.com/obay/scoop-bucket
# then `scoop install obay/rcmd-agent`.
scoops:
  - name: rcmd-agent
    ids: [rcmd-agent]
    repository:
      owner: obay
      name: scoop-bucket
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/obay/rcmd
    description: rcmd remote-execution agent (Windows service)
    license: MIT

  - name: rcmd
    ids: [rcmd-cli]
    repository:
      owner: obay
      name: scoop-bucket
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/obay/rcmd
    description: rcmd operator CLI
    license: MIT

release:
  github:
    owner: obay
    name: rcmd
  draft: false
  prerelease: auto
