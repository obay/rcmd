# obcmd — operator CLI config
# Path: ~/.config/obcmd/config.toml  (macOS / Linux)
#       %APPDATA%\obcmd\config.toml  (Windows — point with --config if needed)

relay_url = "https://ai.obay.cloud"
agent_id  = "sps-dell"

# Pre-shared keys (base64, 32 bytes each).
# operator_key — shared with the relay (NOT with the agent).
# payload_key  — shared with the agent (NOT with the relay).
# Generate fresh keys with:  obcmd keygen --count 2
operator_key = ""
payload_key  = ""

default_shell        = "cmd"     # cmd | powershell
default_timeout_secs = 60
