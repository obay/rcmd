name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -race -count=1

  cross-compile:
    name: cross-compile
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: rcmdd (linux/amd64)
        run: GOOS=linux  GOARCH=amd64 go build -o /tmp/rcmdd        ./cmd/rcmdd
      - name: rcmdd (linux/arm64)
        run: GOOS=linux  GOARCH=arm64 go build -o /tmp/rcmdd-arm    ./cmd/rcmdd
      - name: rcmd-agent (windows/amd64) — the only shipped target
        run: GOOS=windows GOARCH=amd64 go build -o /tmp/rcmd-agent.exe ./cmd/rcmd-agent
      - name: rcmd (darwin/arm64)
        run: GOOS=darwin GOARCH=arm64 go build -o /tmp/rcmd          ./cmd/rcmd
      - name: rcmd (windows/amd64)
        run: GOOS=windows GOARCH=amd64 go build -o /tmp/rcmd.exe     ./cmd/rcmd
