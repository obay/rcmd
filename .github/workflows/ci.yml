name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -race -count=1

  cross-compile:
    name: cross-compile
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: obcmdd (linux/amd64)
        run: GOOS=linux  GOARCH=amd64 go build -o /tmp/obcmdd        ./cmd/obcmdd
      - name: obcmdd (linux/arm64)
        run: GOOS=linux  GOARCH=arm64 go build -o /tmp/obcmdd-arm    ./cmd/obcmdd
      - name: obcmd-agent (windows/amd64) — the only shipped target
        run: GOOS=windows GOARCH=amd64 go build -o /tmp/obcmd-agent.exe ./cmd/obcmd-agent
      - name: obcmd (darwin/arm64)
        run: GOOS=darwin GOARCH=arm64 go build -o /tmp/obcmd          ./cmd/obcmd
      - name: obcmd (windows/amd64)
        run: GOOS=windows GOARCH=amd64 go build -o /tmp/obcmd.exe     ./cmd/obcmd
