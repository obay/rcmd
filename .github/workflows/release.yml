name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed for goreleaser to create the GitHub release
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          # Default token for creating the release in obay/rcmd itself.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-repo token (PAT with repo scope) for publishing to
          # obay/homebrew-tap and obay/scoop-bucket. Create this secret
          # in repo settings → Secrets → Actions.
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
